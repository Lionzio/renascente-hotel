name: Renascente Hotel CI

# Define os gatilhos: O robô roda em pushes e PRs para a branch 'main'
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ==========================================
  # JOB 1: VALIDAÇÃO DO BACKEND (PYTHON/FASTAPI)
  # ==========================================
  backend-checks:
    name: Backend Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar gerenciador Pipenv
        run: pip install pipenv

      - name: Instalar dependências do projeto
        # O --system instala direto no runner do GitHub, o --dev inclui o Black e Pytest
        run: pipenv install --dev --system

      - name: Verificar formatação com Black
        # O --check faz o pipeline falhar se o código não estiver formatado
        run: black --check .

      # (Futuro) Quando escrevermos os testes automatizados, descomentaremos esta linha
      # - name: Rodar bateria de testes (Pytest)
      #   run: pytest

  # ==========================================
  # JOB 2: VALIDAÇÃO DO FRONTEND (REACT/TS)
  # ==========================================
  frontend-checks:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências (NPM)
        run: npm install

      - name: Validar tipagem e compilar (Build)
        # Garante que não há erros de TypeScript e que o Vite consegue gerar a versão de produção
        run: npm run build