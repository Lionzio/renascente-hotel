services:
  db:
    image: postgres:15-alpine
    container_name: renascente_db
    restart: always
    environment:
      POSTGRES_USER: renascente_admin
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: renascente_hotel_db
    ports:
      - "5454:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U renascente_admin -d renascente_hotel_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
    container_name: renascente_api
    restart: always
    # Força a aplicação a rodar e escutar corretamente
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8001:8001"
    # O arquivo .env deve estar OBRIGATORIAMENTE dentro da pasta backend/
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://renascente_admin:securepassword123@db:5432/renascente_hotel_db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: renascente_web
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Truque de mestre: impede que a pasta local sobrescreva a do container
    depends_on:
      - backend

volumes:
  postgres_data: